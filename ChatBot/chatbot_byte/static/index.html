<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Byte — Chatbot Inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161820;
    --surface2: #1e2028;
    --border: #2a2d3a;
    --accent: #7c6df0;
    --accent2: #5eead4;
    --text: #e8eaf0;
    --muted: #7a7d8e;
    --user-bubble: #7c6df0;
    --bot-bubble: #1e2028;
    --radius: 18px;
    --font: 'Space Grotesk', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: var(--font);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .mascot-avatar { width: 48px; height: 48px; position: relative; flex-shrink: 0; }
  .mascot-avatar svg { width: 100%; height: 100%; }
  .mascot-body-anim { animation: float 3s ease-in-out infinite; }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-3px); }
  }

  .header-info h1 { font-size: 17px; font-weight: 600; color: var(--text); }

  .status {
    font-size: 12px; color: var(--accent2);
    display: flex; align-items: center; gap: 5px;
    font-family: var(--mono);
  }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right {
    margin-left: auto; font-size: 12px; color: var(--muted);
    font-family: var(--mono); background: var(--surface2);
    padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex; align-items: flex-end; gap: 10px;
    animation: slideIn 0.3s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar-mini { width: 30px; height: 30px; flex-shrink: 0; }
  .avatar-mini svg { width: 100%; height: 100%; }

  .bubble {
    max-width: 70%; padding: 12px 16px; border-radius: var(--radius);
    font-size: 15px; line-height: 1.6; position: relative;
  }

  .bubble.bot {
    background: var(--bot-bubble); border: 1px solid var(--border);
    border-bottom-left-radius: 4px; color: var(--text);
  }

  .bubble.user {
    background: var(--user-bubble); border-bottom-right-radius: 4px;
    color: #fff; font-weight: 500;
  }

  .bubble code {
    font-family: var(--mono); background: rgba(124,109,240,0.15);
    padding: 1px 5px; border-radius: 4px; font-size: 13px; color: var(--accent2);
  }

  .typing-bubble {
    background: var(--bot-bubble); border: 1px solid var(--border);
    border-radius: var(--radius); border-bottom-left-radius: 4px;
    padding: 14px 18px; display: flex; gap: 5px; align-items: center;
  }

  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .welcome-card {
    background: linear-gradient(135deg, #1a1c2e 0%, #1e2028 100%);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 24px; text-align: center; margin: 8px 0 4px;
  }

  .welcome-card .big-avatar { width: 80px; height: 80px; margin: 0 auto 14px; }

  .welcome-card h2 {
    font-size: 20px; font-weight: 700; margin-bottom: 6px;
    background: linear-gradient(135deg, #7c6df0, #5eead4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .welcome-card p { color: var(--muted); font-size: 14px; line-height: 1.6; }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-top: 16px;
  }

  .suggestion-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 7px 14px; font-size: 13px;
    color: var(--text); cursor: pointer; font-family: var(--font);
    transition: all 0.2s;
  }

  .suggestion-btn:hover {
    border-color: var(--accent); color: var(--accent);
    background: rgba(124,109,240,0.08);
  }

  footer {
    padding: 16px 20px 20px; background: var(--surface);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }

  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 24px; padding: 8px 8px 8px 18px; transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--font); font-size: 15px;
    resize: none; max-height: 120px; line-height: 1.5; padding: 6px 0;
  }

  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
    border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.2s;
  }

  #send-btn:hover { background: #9585f5; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.96); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  #send-btn svg { width: 18px; height: 18px; }

  .footer-hint {
    text-align: center; margin-top: 10px; font-size: 11px;
    color: var(--muted); font-family: var(--mono);
  }

  .bubble.error {
    background: rgba(226,75,74,0.1); border-color: rgba(226,75,74,0.3); color: #f09595;
  }
</style>
</head>
<body>

<header>
  <div class="mascot-avatar">
    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <g class="mascot-body-anim">
        <rect x="8" y="14" width="32" height="26" rx="8" fill="#7c6df0"/>
        <rect x="12" y="18" width="24" height="16" rx="4" fill="#1a1c2e"/>
        <circle cx="18" cy="26" r="3" fill="#5eead4"/>
        <circle cx="30" cy="26" r="3" fill="#5eead4"/>
        <circle cx="19" cy="25" r="1" fill="#0d0f14"/>
        <circle cx="31" cy="25" r="1" fill="#0d0f14"/>
        <line x1="24" y1="14" x2="24" y2="6" stroke="#a89cf7" stroke-width="2" stroke-linecap="round"/>
        <circle cx="24" cy="5" r="3" fill="#5eead4"/>
        <rect x="14" y="38" width="7" height="6" rx="3" fill="#5c4de0"/>
        <rect x="27" y="38" width="7" height="6" rx="3" fill="#5c4de0"/>
        <rect x="2" y="22" width="8" height="5" rx="2.5" fill="#5c4de0"/>
        <rect x="38" y="22" width="8" height="5" rx="2.5" fill="#5c4de0"/>
      </g>
    </svg>
  </div>
  <div class="header-info">
    <h1>Byte</h1>
    <div class="status"><div class="status-dot"></div>online e pronto</div>
  </div>
  <div class="header-right">localhost:5000</div>
</header>

<div id="messages">
  <div class="welcome-card">
    <div class="big-avatar">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <g style="animation: float 3s ease-in-out infinite;">
          <rect x="10" y="20" width="60" height="46" rx="14" fill="#7c6df0"/>
          <rect x="18" y="28" width="44" height="28" rx="7" fill="#1a1c2e"/>
          <circle cx="31" cy="42" r="5" fill="#5eead4"/>
          <circle cx="49" cy="42" r="5" fill="#5eead4"/>
          <circle cx="33" cy="40" r="2" fill="#0d0f14"/>
          <circle cx="51" cy="40" r="2" fill="#0d0f14"/>
          <line x1="40" y1="20" x2="40" y2="8" stroke="#a89cf7" stroke-width="3" stroke-linecap="round"/>
          <circle cx="40" cy="6" r="5" fill="#5eead4"/>
          <rect x="20" y="64" width="14" height="10" rx="5" fill="#5c4de0"/>
          <rect x="46" y="64" width="14" height="10" rx="5" fill="#5c4de0"/>
          <rect x="2" y="34" width="10" height="9" rx="4" fill="#5c4de0"/>
          <rect x="68" y="34" width="10" height="9" rx="4" fill="#5c4de0"/>
        </g>
      </svg>
    </div>
    <h2>Olá! Eu sou o Byte ✦</h2>
    <p>Rodando em localhost — zero CORS, 100% funcional!<br>Pergunte qualquer coisa, adoro ajudar.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion('Quem é você?')">Quem é você?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Me explique como funciona a internet')">Como funciona a internet?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Me conte uma curiosidade incrível')">Curiosidade incrível</button>
      <button class="suggestion-btn" onclick="sendSuggestion('Me ajude a aprender Python')">Aprender Python</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Digite sua mensagem para o Byte..."></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="footer-hint">Enter para enviar · Shift+Enter para nova linha</div>
</footer>

<script>
let history = [];
let isLoading = false;

const messagesDiv = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

function sendSuggestion(text) { inputEl.value = text; sendMessage(); }

function botAvatar() {
  return `<div class="avatar-mini">
    <svg viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="8" width="24" height="18" rx="6" fill="#7c6df0"/>
      <rect x="6" y="11" width="18" height="11" rx="3" fill="#1a1c2e"/>
      <circle cx="11" cy="16.5" r="2.5" fill="#5eead4"/>
      <circle cx="19" cy="16.5" r="2.5" fill="#5eead4"/>
      <circle cx="12" cy="15.5" r="1" fill="#0d0f14"/>
      <circle cx="20" cy="15.5" r="1" fill="#0d0f14"/>
      <line x1="15" y1="8" x2="15" y2="3" stroke="#a89cf7" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="15" cy="2.5" r="2" fill="#5eead4"/>
    </svg>
  </div>`;
}

function addMessage(text, sender) {
  const row = document.createElement('div');
  row.className = `msg-row ${sender}`;
  const bubble = document.createElement('div');
  bubble.className = `bubble ${sender}`;
  bubble.innerHTML = formatText(text);
  if (sender === 'bot') {
    row.innerHTML = botAvatar();
    row.appendChild(bubble);
  } else {
    row.appendChild(bubble);
  }
  messagesDiv.appendChild(row);
  scrollToBottom();
}

function addErrorMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = botAvatar();
  const bubble = document.createElement('div');
  bubble.className = 'bubble error';
  bubble.textContent = text;
  row.appendChild(bubble);
  messagesDiv.appendChild(row);
  scrollToBottom();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';
  row.innerHTML = botAvatar();
  const t = document.createElement('div');
  t.className = 'typing-bubble';
  t.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
  row.appendChild(t);
  messagesDiv.appendChild(row);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-row');
  if (el) el.remove();
}

function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;

  addMessage(text, 'user');
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    hideTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Erro ${res.status}`);
    }

    const data = await res.json();
    history.push({ role: 'assistant', content: data.reply });
    addMessage(data.reply, 'bot');

    if (history.length > 20) history = history.slice(-20);

  } catch (err) {
    hideTyping();
    addErrorMessage(`⚠️ Erro ao conectar com o servidor: ${err.message}`);
    history.pop();
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
